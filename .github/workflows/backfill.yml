name: Backfill Contributions (Smart + Public API)

on:
  workflow_dispatch:
    inputs:
      github_username:
        description: '您的 GitHub 用户名（若勾选“从账号创建开始”则必须填写）'
        required: false
        default: ''
      start_date:
        description: '开始日期 (YYYY-MM-DD)，留空则自动计算（若勾选“从账号创建开始”则忽略此值）'
        required: false
        default: ''
      end_date:
        description: '结束日期 (YYYY-MM-DD)，留空则自动计算为昨天'
        required: false
        default: ''
      from_account_creation:
        description: '从账号创建日期开始回填（将忽略 start_date，且必须填写用户名）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      dry_run:
        description: '仅测试运行，不实际推送 (dry-run)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force_push:
        description: '是否强制推送 (--force-with-lease)？慎用！'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "SunsetRNE"
          git config user.email "z100o190zgxc@163.com"
          echo "Git 用户配置完成："
          git config user.name
          git config user.email

      - name: 检查邮箱是否已验证
        run: |
          EMAIL="z100o190zgxc@163.com"
          # 使用公开 API 无法验证邮箱，仅提醒用户自行确认
          echo "请确保邮箱 $EMAIL 已在 GitHub 设置中验证，否则提交不会计入贡献。"
          echo "验证地址：https://github.com/settings/emails"

      - name: 获取账号创建日期（如果选择了“从账号创建开始”）
        id: account_creation
        if: github.event.inputs.from_account_creation == 'true'
        run: |
          USERNAME="${{ github.event.inputs.github_username }}"
          if [[ -z "$USERNAME" ]]; then
            echo "❌ 您选择了“从账号创建开始”，但未提供用户名。"
            echo "请在输入框中填写您的 GitHub 用户名。"
            exit 1
          fi

          echo "正在获取用户 $USERNAME 的创建时间..."
          USER_INFO=$(curl -s "https://api.github.com/users/$USERNAME")
          CREATED_AT=$(echo "$USER_INFO" | jq -r '.created_at')

          if [[ "$CREATED_AT" == "null" || -z "$CREATED_AT" ]]; then
            echo "❌ 无法获取账号创建时间，请检查用户名是否正确。"
            echo "API 返回信息："
            echo "$USER_INFO" | jq .
            exit 1
          fi

          CREATED_DATE=$(date -d "$CREATED_AT" +%Y-%m-%d)
          echo "📅 账号创建日期: $CREATED_DATE"
          echo "creation_date=$CREATED_DATE" >> $GITHUB_OUTPUT

      - name: 计算日期范围
        id: dates
        run: |
          if [[ "${{ github.event.inputs.from_account_creation }}" == "true" ]]; then
            START="${{ steps.account_creation.outputs.creation_date }}"
            if [[ -z "$START" ]]; then
              echo "❌ 账号创建日期获取失败"
              exit 1
            fi
          else
            if [[ -n "${{ github.event.inputs.start_date }}" ]]; then
              START="${{ github.event.inputs.start_date }}"
            else
              START=$(date -d "1 year ago" +%Y-%m-%d)
            fi
          fi

          if [[ -n "${{ github.event.inputs.end_date }}" ]]; then
            END="${{ github.event.inputs.end_date }}"
          else
            END=$(date -d "yesterday" +%Y-%m-%d)
          fi

          # 验证日期格式
          if ! date -d "$START" >/dev/null 2>&1; then
            echo "❌ 无效的开始日期: $START"
            exit 1
          fi
          if ! date -d "$END" >/dev/null 2>&1; then
            echo "❌ 无效的结束日期: $END"
            exit 1
          fi

          if [[ "$START" > "$END" ]]; then
            echo "❌ 开始日期不能晚于结束日期"
            exit 1
          fi

          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END" >> $GITHUB_OUTPUT
          echo "📅 日期范围: $START 到 $END"

      - name: 生成缺失的历史提交（跳过已有日期的提交）
        id: generate
        run: |
          START="${{ steps.dates.outputs.start }}"
          END="${{ steps.dates.outputs.end }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          echo "📝 开始检查日期范围: $START 到 $END"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "⚠️ 当前为干运行模式，不会生成实际提交"
          fi

          total_days=0
          missing_days=0

          current="$START"
          while [[ "$current" != $(date -d "$END + 1 day" +%Y-%m-%d) ]]; do
            total_days=$((total_days + 1))
            echo "🔍 检查日期: $current"

            commit_count=$(git log --after="$current 00:00:00" --before="$current 23:59:59" --oneline 2>/dev/null | wc -l)

            if [[ $commit_count -gt 0 ]]; then
              echo "   ✅ 该日期已有 $commit_count 次提交，跳过"
            else
              missing_days=$((missing_days + 1))
              echo "   ❌ 该日期无提交，需要生成"

              if [[ "$DRY_RUN" != "true" ]]; then
                echo "Backfill commit on $current" >> activity.log
                git add activity.log
                if git commit --date="$current 12:00:00" -m "chore: backfill $current"; then
                  echo "   ✅ 已生成提交 $current"
                else
                  echo "   ⚠️ 提交失败，可能该日期已存在提交？但检查时未发现，请手动检查"
                fi
              else
                echo "   (干运行) 将生成提交 $current"
              fi
            fi

            current=$(date -d "$current + 1 day" +%Y-%m-%d)
          done

          echo "📊 统计: 总天数 $total_days，缺失天数 $missing_days"
          echo "missing=$missing_days" >> $GITHUB_OUTPUT

      - name: 推送更改（仅在非干运行且有新提交时执行）
        if: github.event.inputs.dry_run == 'false' && steps.generate.outputs.missing > 0
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          FORCE_PUSH="${{ github.event.inputs.force_push }}"

          git fetch origin "$BRANCH_NAME"

          if [[ "$FORCE_PUSH" == "true" ]]; then
            echo "⚠️ 使用 --force-with-lease 推送（可能覆盖他人的更改）"
            git push --force-with-lease origin "$BRANCH_NAME"
          else
            echo "尝试普通推送..."
            if git push origin "$BRANCH_NAME"; then
              echo "✅ 推送成功"
            else
              echo "❌ 推送失败，可能是远程分支有更新。"
              echo "建议操作："
              echo "1. 检查是否有其他人同时推送"
              echo "2. 如需强制覆盖，请重新运行工作流并设置 force_push=true"
              exit 1
            fi
          fi

      - name: 无新提交跳过推送
        if: github.event.inputs.dry_run == 'false' && steps.generate.outputs.missing == 0
        run: |
          echo "✅ 没有发现缺失的日期，无需推送。"

      - name: 完成提示
        if: always()
        run: |
          echo "🎉 工作流执行完毕"
          echo "请前往 GitHub 查看贡献图更新（可能需要几分钟刷新）"
